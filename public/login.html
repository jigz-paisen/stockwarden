<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockWarden — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #222222;
      --accent:   #00d4aa;
      --text:     #f0f0f0;
      --muted:    #666;
      --danger:   #ff4d4d;
      --success:  #00d4aa;
      --input-bg: #1a1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #0099ff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text);
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .remember-row label {
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-submit:hover    { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,77,77,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <h1>StockWarden</h1>
    <p>Inventory Management System</p>
  </div>

  <h2>Sign in to your account</h2>

  <div id="login-error" class="error-msg"></div>

  <div class="field">
    <label for="login-username">Username</label>
    <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
  </div>

  <div class="field">
    <label for="login-password">Password</label>
    <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
  </div>

  <div class="remember-row">
    <input type="checkbox" id="remember-me" />
    <label for="remember-me">Remember me for 30 days</label>
  </div>

  <button class="btn-submit" id="login-btn" onclick="doLogin()">Sign In</button>
</div>

<script>
  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const remember = document.getElementById('remember-me').checked;

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled    = true;
    btn.textContent = 'Signing in…';
    document.getElementById('login-error').style.display = 'none';

    try {
      const res  = await fetch('/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password, remember }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Invalid username or password');
      } else {
        window.location.href = '/';
      }
    } catch (err) {
      showError('Could not connect to server. Please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
