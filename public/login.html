<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockWarden — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #222222;
      --accent:   #00d4aa;
      --text:     #f0f0f0;
      --muted:    #666;
      --danger:   #ff4d4d;
      --success:  #00d4aa;
      --input-bg: #1a1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #0099ff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Forms */
    .form { display: none; }
    .form.active { display: block; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .remember-row label {
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,77,77,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: rgba(0,212,170,0.1);
      border: 1px solid var(--success);
      color: var(--success);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <h1>StockWarden</h1>
    <p>Inventory Management System</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab"        onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login" class="form active">
    <div id="login-error"   class="error-msg"></div>
    <div id="login-success" class="success-msg"></div>

    <div class="field">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <div class="remember-row">
      <input type="checkbox" id="remember-me" />
      <label for="remember-me">Remember me for 30 days</label>
    </div>

    <button class="btn-submit" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" class="form">
    <div id="signup-error"   class="error-msg"></div>
    <div id="signup-success" class="success-msg"></div>

    <div class="field">
      <label for="signup-username">Username</label>
      <input type="text" id="signup-username" placeholder="Choose a username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="signup-password">Password</label>
      <input type="password" id="signup-password" placeholder="Choose a strong password" autocomplete="new-password" />
    </div>

    <div class="field">
      <label for="signup-invite">Admin Invite Code</label>
      <input type="password" id="signup-invite" placeholder="Provided by your administrator" />
    </div>

    <button class="btn-submit" id="signup-btn" onclick="doSignup()" style="margin-top:4px">Create Account</button>
  </div>
</div>

<script>
  /* ---- Tab switching ---- */
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('form-login').classList.toggle('active',  tab === 'login');
    document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
  }

  /* ---- Show / hide messages ---- */
  function showError(formId, msg) {
    const el = document.getElementById(formId + '-error');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById(formId + '-success').style.display = 'none';
  }

  function showSuccess(formId, msg) {
    const el = document.getElementById(formId + '-success');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById(formId + '-error').style.display = 'none';
  }

  function clearMessages(formId) {
    document.getElementById(formId + '-error').style.display   = 'none';
    document.getElementById(formId + '-success').style.display = 'none';
  }

  /* ---- Login ---- */
  async function doLogin() {
    clearMessages('login');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const remember = document.getElementById('remember-me').checked;

    if (!username || !password) {
      showError('login', 'Please enter your username and password.');
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password, remember }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError('login', data.error || 'Login failed');
      } else {
        showSuccess('login', 'Welcome back! Redirecting…');
        setTimeout(() => window.location.href = '/', 800);
      }
    } catch (err) {
      showError('login', 'Could not connect to server. Please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  /* ---- Sign up (invite-code gated) ---- */
  async function doSignup() {
    clearMessages('signup');
    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const invite   = document.getElementById('signup-invite').value;

    if (!username || !email || !password || !invite) {
      showError('signup', 'All fields are required.');
      return;
    }

    const btn = document.getElementById('signup-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const res  = await fetch('/auth/signup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, email, password, invite_code: invite }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError('signup', data.error || 'Sign up failed');
      } else {
        showSuccess('signup', 'Account created! You can now sign in.');
        setTimeout(() => switchTab('login'), 1500);
      }
    } catch (err) {
      showError('signup', 'Could not connect to server. Please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Create Account';
    }
  }

  /* ---- Enter key support ---- */
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('form-login').classList.contains('active');
    if (loginActive) doLogin(); else doSignup();
  });
</script>
</body>
</html>
